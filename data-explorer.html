<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Explorer | Han Lin Mai</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="data-explorer.css">
    <script src="sidebar.js"></script>
    <script src="auth-config.js"></script>
    <script src="auth.js"></script>
    <!-- 3Dmol.js for in-browser atomic structure rendering -->
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
</head>
<body>
    <nav></nav>

    <main class="explorer-main">
        <header class="explorer-header">
            <h1>Data Explorer</h1>
            <p class="explorer-subtitle">Interactive views of the computational materials datasets. Pick a dataset tab, drill in by element, then click a grain boundary to see the substitutional sites colored by segregation energy.</p>
        </header>

        <!-- Top-level dataset tabs -->
        <div class="dataset-tabs" id="dataset-tabs" role="tablist"></div>

        <!-- Per-dataset panels (one rendered active at a time) -->
        <div id="dataset-panels"></div>

        <!-- Templates ----------------------------------------------------- -->
        <template id="tpl-dataset-panel">
            <div class="dataset-panel" role="tabpanel">
                <nav class="subtab-nav" role="tablist">
                    <button class="subtab-btn active" data-subtab="overview" role="tab">Overview</button>
                    <button class="subtab-btn" data-subtab="browse" role="tab">Browse by Element</button>
                </nav>

                <section class="subtab-pane subtab-overview active" data-pane="overview"></section>
                <section class="subtab-pane subtab-browse" data-pane="browse" hidden>
                    <div class="browse-layout">
                        <div class="browse-pt">
                            <p class="browse-help">Click a highlighted element to see its data in this dataset. Highlighted = data available; dim = none.</p>
                            <div class="periodic-table"></div>
                            <div class="category-legend">
                                <div class="legend-item"><div class="legend-color alkali-metal"></div> Alkali</div>
                                <div class="legend-item"><div class="legend-color alkaline-earth-metal"></div> Alkaline E.</div>
                                <div class="legend-item"><div class="legend-color transition-metal"></div> Transition</div>
                                <div class="legend-item"><div class="legend-color lanthanide"></div> Lanthanide</div>
                                <div class="legend-item"><div class="legend-color actinide"></div> Actinide</div>
                                <div class="legend-item"><div class="legend-color post-transition-metal"></div> Post-Tr.</div>
                                <div class="legend-item"><div class="legend-color metalloid"></div> Metalloid</div>
                                <div class="legend-item"><div class="legend-color reactive-nonmetal"></div> Nonmetal</div>
                                <div class="legend-item"><div class="legend-color noble-gas"></div> Noble</div>
                            </div>
                        </div>
                        <aside class="browse-element-panel">
                            <div class="element-empty">
                                <p>Pick an element to begin.</p>
                            </div>
                        </aside>
                    </div>
                    <div class="browse-viewer-region" hidden></div>
                </section>
            </div>
        </template>
    </main>

            {number:71,symbol:"Lu",name:"Lutetium",col:18,row:9,cat:"lanthanide"},
            {number:90,symbol:"Th",name:"Thorium",col:5,row:10,cat:"actinide"},
            {number:91,symbol:"Pa",name:"Protactinium",col:6,row:10,cat:"actinide"},
            {number:92,symbol:"U",name:"Uranium",col:7,row:10,cat:"actinide"},
            {number:93,symbol:"Np",name:"Neptunium",col:8,row:10,cat:"actinide"},
            {number:94,symbol:"Pu",name:"Plutonium",col:9,row:10,cat:"actinide"},
            {number:95,symbol:"Am",name:"Americium",col:10,row:10,cat:"actinide"},
            {number:96,symbol:"Cm",name:"Curium",col:11,row:10,cat:"actinide"},
            {number:97,symbol:"Bk",name:"Berkelium",col:12,row:10,cat:"actinide"},
            {number:98,symbol:"Cf",name:"Californium",col:13,row:10,cat:"actinide"},
            {number:99,symbol:"Es",name:"Einsteinium",col:14,row:10,cat:"actinide"},
            {number:100,symbol:"Fm",name:"Fermium",col:15,row:10,cat:"actinide"},
            {number:101,symbol:"Md",name:"Mendelevium",col:16,row:10,cat:"actinide"},
            {number:102,symbol:"No",name:"Nobelium",col:17,row:10,cat:"actinide"},
            {number:103,symbol:"Lr",name:"Lawrencium",col:18,row:10,cat:"actinide"},
        ];
        const ELEMENT_BY_SYM = Object.fromEntries(ELEMENTS.map(e => [e.symbol, e]));

        // Reasonable per-element atomic radii (Å, covalent) for sphere sizing.
        // Falls back to 1.4 if not listed.
        const ATOMIC_RADIUS = {
            H:0.31,He:0.28,Li:1.28,Be:0.96,B:0.84,C:0.76,N:0.71,O:0.66,F:0.57,Ne:0.58,
            Na:1.66,Mg:1.41,Al:1.21,Si:1.11,P:1.07,S:1.05,Cl:1.02,Ar:1.06,
            K:2.03,Ca:1.76,Sc:1.70,Ti:1.60,V:1.53,Cr:1.39,Mn:1.39,Fe:1.32,Co:1.26,Ni:1.24,Cu:1.32,Zn:1.22,
            Ga:1.22,Ge:1.20,As:1.19,Se:1.20,Br:1.20,Kr:1.16,
            Rb:2.20,Sr:1.95,Y:1.90,Zr:1.75,Nb:1.64,Mo:1.54,Tc:1.47,Ru:1.46,Rh:1.42,Pd:1.39,Ag:1.45,Cd:1.44,
            In:1.42,Sn:1.39,Sb:1.39,Te:1.38,I:1.39,Xe:1.40,
            Cs:2.44,Ba:2.15,La:2.07,Hf:1.75,Ta:1.70,W:1.62,Re:1.51,Os:1.44,Ir:1.41,Pt:1.36,Au:1.36,Hg:1.32,
            Tl:1.45,Pb:1.46,Bi:1.48,Po:1.40,At:1.50,Rn:1.50,
            Ce:2.04,Pr:2.03,Nd:2.01,Pm:1.99,Sm:1.98,Eu:1.98,Gd:1.96,Tb:1.94,Dy:1.92,Ho:1.92,Er:1.89,Tm:1.90,Yb:1.87,Lu:1.87,
            Th:2.06,Pa:2.00,U:1.96,Np:1.90,Pu:1.87,Am:1.80,
        };
        const elementRadius = (sym) => ATOMIC_RADIUS[sym] || 1.4;

        // 3Dmol-flavoured element coloring (Jmol palette). Keep host (Fe) muted so
        // sub-sites pop visually.
        const ELEMENT_COLOR = {
            Fe: 0xa8a29e,  // muted slate for host atoms
        };
        const elementColor = (sym) => ELEMENT_COLOR[sym] ?? 0x8b8b8b;

        // =====================================================================
        // App state
        // =====================================================================
        const STATE = {
            datasetsMeta: null,    // /data/datasets.json
            elementIndex: null,    // /data/element_index.json
            structuresIndex: null, // /data/structures/index.json
            activeDatasetId: null,
            activeSubtab: { /* ds_id -> 'overview' | 'browse' */ },
            elementCache: {},      // sym -> records[]
            structureCache: {},    // `${ds}/${gb}` -> payload
            viewers: {},           // ds_id -> { gl3dViewer, currentGB, currentElement }
        };

        // =====================================================================
        // Init
        // =====================================================================
        async function init() {
            try {
                const [meta, idx, struct] = await Promise.all([
                    fetch('data/datasets.json').then(r => r.json()),
                    fetch('data/element_index.json').then(r => r.json()),
                    fetch('data/structures/index.json').then(r => r.json()),
                ]);
                STATE.datasetsMeta = meta;
                STATE.elementIndex = idx;
                STATE.structuresIndex = struct;
            } catch (e) {
                console.error('Failed to load metadata:', e);
                document.getElementById('dataset-panels').innerHTML =
                    '<p style="color:#b91c1c">Could not load dataset metadata. Please refresh.</p>';
                return;
            }

            renderTabs();
            // default: first dataset
            if (STATE.datasetsMeta.length) {
                setActiveDataset(STATE.datasetsMeta[0].id);
            }
        }

        // =====================================================================
        // Tabs (top-level dataset switcher)
        // =====================================================================
        function renderTabs() {
            const host = document.getElementById('dataset-tabs');
            host.innerHTML = '';
            STATE.datasetsMeta.forEach(ds => {
                const btn = document.createElement('button');
                btn.className = 'dataset-tab-btn';
                btn.dataset.ds = ds.id;
                btn.role = 'tab';
                btn.innerHTML = `<span class="ds-tab-name">${ds.name}</span>
                                 <span class="ds-tab-meta">${ds.n_rows.toLocaleString()} records · ${ds.n_elements} elements</span>`;
                btn.onclick = () => setActiveDataset(ds.id);
                host.appendChild(btn);
            });
        }

        function setActiveDataset(dsId) {
            STATE.activeDatasetId = dsId;
            // tab buttons
            document.querySelectorAll('.dataset-tab-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.ds === dsId);
                b.setAttribute('aria-selected', b.dataset.ds === dsId);
            });

            // ensure panel exists
            let panel = document.querySelector(`.dataset-panel[data-ds="${dsId}"]`);
            if (!panel) {
                panel = mountDatasetPanel(dsId);
            }
            document.querySelectorAll('.dataset-panel').forEach(p => {
                p.classList.toggle('active', p === panel);
            });
        }

        function mountDatasetPanel(dsId) {
            const tpl = document.getElementById('tpl-dataset-panel');
            const node = tpl.content.firstElementChild.cloneNode(true);
            node.dataset.ds = dsId;
            node.id = `panel-${dsId}`;
            document.getElementById('dataset-panels').appendChild(node);

            // sub-tab nav
            node.querySelectorAll('.subtab-btn').forEach(btn => {
                btn.onclick = () => setSubtab(dsId, btn.dataset.subtab);
            });

            // populate Overview pane
            renderOverview(dsId, node.querySelector('[data-pane="overview"]'));
            // populate Browse pane (periodic table)
            buildPeriodicTable(dsId, node.querySelector('.browse-pt .periodic-table'));

            return node;
        }

        function setSubtab(dsId, sub) {
            STATE.activeSubtab[dsId] = sub;
            const panel = document.querySelector(`.dataset-panel[data-ds="${dsId}"]`);
            if (!panel) return;
            panel.querySelectorAll('.subtab-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.subtab === sub);
            });
            panel.querySelectorAll('.subtab-pane').forEach(p => {
                const active = p.dataset.pane === sub;
                p.classList.toggle('active', active);
                p.hidden = !active;
            });
            // 3Dmol viewers can render incorrectly when their container was hidden;
            // resize on display.
            if (sub === 'browse') {
                const v = STATE.viewers[dsId];
                if (v && v.gl3dViewer) {
                    setTimeout(() => v.gl3dViewer.resize(), 50);
                }
            }
        }

        // =====================================================================
        // Overview pane
        // =====================================================================
        function renderOverview(dsId, host) {
            const ds = STATE.datasetsMeta.find(d => d.id === dsId);
            const struct = (STATE.structuresIndex || {})[dsId] || [];
            const ttlEseg = struct.flatMap(g => [g.Eseg_min, g.Eseg_max]).filter(v => v != null);
            const minE = ttlEseg.length ? Math.min(...ttlEseg) : null;
            const maxE = ttlEseg.length ? Math.max(...ttlEseg) : null;

            const params = DATASET_PARAMS[dsId] || DATASET_PARAMS._default;

            host.innerHTML = `
                <div class="overview-grid">
                    <div class="overview-card">
                        <h2>${ds.name}</h2>
                        <p class="overview-desc">${ds.description}</p>
                        <p class="overview-method"><strong>Method:</strong> ${ds.method}</p>
                    </div>

                    <div class="overview-card">
                        <h3>At a glance</h3>
                        <div class="stat-grid">
                            <div class="stat"><div class="stat-num">${ds.n_rows.toLocaleString()}</div><div class="stat-lbl">Records</div></div>
                            <div class="stat"><div class="stat-num">${ds.n_elements}</div><div class="stat-lbl">Solute elements</div></div>
                            <div class="stat"><div class="stat-num">${struct.length}</div><div class="stat-lbl">Grain boundaries</div></div>
                            <div class="stat"><div class="stat-num">${struct.reduce((s,g)=>s+g.n_sites,0)}</div><div class="stat-lbl">Sub. sites (total)</div></div>
                            ${minE != null ? `<div class="stat"><div class="stat-num">${minE.toFixed(2)} <span class="unit">eV</span></div><div class="stat-lbl">Min E<sub>seg</sub></div></div>` : ''}
                            ${maxE != null ? `<div class="stat"><div class="stat-num">${maxE.toFixed(2)} <span class="unit">eV</span></div><div class="stat-lbl">Max E<sub>seg</sub></div></div>` : ''}
                        </div>
                    </div>

                    <div class="overview-card">
                        <h3>Calculation parameters</h3>
                        <table class="param-table">
                            <tbody>
                                ${params.map(p => `<tr><td>${p[0]}</td><td>${p[1]}</td></tr>`).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="overview-card">
                        <h3>Grain boundaries in this dataset</h3>
                        <ul class="gb-list">
                            ${struct.map(g => `<li><code>${g.GB}</code> &mdash; ${g.n_atoms} atoms, ${g.n_sites} sub. sites</li>`).join('')}
                        </ul>
                    </div>

                    <div class="overview-card span-2">
                        <h3>Downloads</h3>
                        <p class="download-blurb">Full dataset including atomic structures, forces, magnetic moments, and INCAR/KPOINTS metadata is available as a single Parquet file.</p>
                        <div class="download-row">
                            <a href="${ds.parquet_url}" class="download-btn primary" download>Download full Parquet (${ds.parquet_size_mb || '?'} MB)</a>
                            <a href="https://pypi.org/project/lzdata/" class="download-btn" target="_blank" rel="noopener">Or use the <code>lzdata</code> Python client &rarr;</a>
                        </div>
                    </div>
                </div>

                <div class="cta-row">
                    <button class="cta-btn" onclick="setSubtab('${dsId}', 'browse')">Browse by element &rarr;</button>
                </div>
            `;
        }

        // Hardcoded calculation parameters (consistent within a dataset).
        const DATASET_PARAMS = {
            fe_x_gb_kp_unrelaxed: [
                ['Code', 'VASP / PAW-PBE'],
                ['ENCUT', '400 eV'],
                ['ISMEAR / SIGMA', '1 / 0.1 (Methfessel–Paxton)'],
                ['EDIFF', '1×10⁻⁵ eV'],
                ['IBRION / ISIF', '−1 / 2 (no ionic relaxation)'],
                ['ISPIN', '2 (spin-polarized)'],
                ['Initial magmoms', 'AFM Fe (KP method)'],
                ['k-mesh', 'Γ-centered, dataset-dependent'],
                ['Defect type', 'Substitutional'],
            ],
            fe_x_gb_kp_relaxed: [
                ['Code', 'VASP / PAW-PBE'],
                ['ENCUT', '400 eV'],
                ['ISMEAR / SIGMA', '1 / 0.1 (Methfessel–Paxton)'],
                ['EDIFF / EDIFFG', '1×10⁻⁵ eV / −0.01 eV/Å'],
                ['IBRION / ISIF', '2 / 2 (ionic relaxation, fixed cell)'],
                ['ISPIN', '2 (spin-polarized)'],
                ['Initial magmoms', 'AFM Fe (KP method)'],
                ['k-mesh', 'Γ-centered, dataset-dependent'],
                ['Defect type', 'Substitutional'],
            ],
            _default: [['Code', 'VASP / PAW-PBE']],
        };

        // =====================================================================
        // Periodic table (per-dataset)
        // =====================================================================
        function buildPeriodicTable(dsId, container) {
            container.innerHTML = '';
            ELEMENTS.forEach(el => {
                const cell = document.createElement('div');
                cell.className = `element-cell ${el.cat}`;
                cell.style.gridColumn = el.col;
                cell.style.gridRow = el.row;
                cell.dataset.symbol = el.symbol;

                const info = STATE.elementIndex && STATE.elementIndex[el.symbol];
                const dsInfo = info && info.datasets && info.datasets[dsId];
                const hasData = !!dsInfo;

                let inner = `<span class="number">${el.number}</span><strong>${el.symbol}</strong>`;
                if (hasData) {
                    cell.classList.add('has-data');
                    cell.title = `${el.name} — ${dsInfo.count} records in this dataset`;
                } else {
                    cell.classList.add('no-data');
                    cell.title = `${el.name}: not in this dataset`;
                }
                cell.innerHTML = inner;
                cell.onclick = () => loadElementForDataset(dsId, el.symbol, el.name);
                container.appendChild(cell);
            });
        }

        // =====================================================================
        // Element panel — shows GB cards for the selected element + dataset
        // =====================================================================
        async function loadElementForDataset(dsId, symbol, name) {
            const panel = document.querySelector(`.dataset-panel[data-ds="${dsId}"]`);
            if (!panel) return;

            // mark active cell
            panel.querySelectorAll('.element-cell').forEach(c => c.classList.remove('active'));
            const cell = panel.querySelector(`.element-cell[data-symbol="${symbol}"]`);
            if (cell) cell.classList.add('active');

            const aside = panel.querySelector('.browse-element-panel');

            const info = STATE.elementIndex && STATE.elementIndex[symbol];
            const dsInfo = info && info.datasets && info.datasets[dsId];
            if (!dsInfo) {
                aside.innerHTML = `<div class="element-empty"><p><strong>${name}</strong> (${symbol}) is not in this dataset.</p></div>`;
                return;
            }

            aside.innerHTML = `<div class="element-loading">Loading <strong>${symbol}</strong>…</div>`;

            // load per-element records (cached)
            let records;
            if (STATE.elementCache[symbol]) {
                records = STATE.elementCache[symbol];
            } else {
                try {
                    const r = await fetch(`data/elements/${symbol}.json`);
                    records = await r.json();
                    STATE.elementCache[symbol] = records;
                } catch (e) {
                    console.error(e);
                    aside.innerHTML = `<div class="element-empty"><p>Failed to load data for ${symbol}.</p></div>`;
                    return;
                }
            }

            const dsRecords = records.filter(r => r.dataset_id === dsId);
            renderElementPanel(dsId, symbol, name, dsInfo, dsRecords, aside);
        }

        function renderElementPanel(dsId, symbol, name, dsInfo, dsRecords, aside) {
            // Group records by GB
            const byGB = {};
            dsRecords.forEach(r => {
                if (!byGB[r.GB]) byGB[r.GB] = [];
                byGB[r.GB].push(r);
            });

            const gbList = (STATE.structuresIndex[dsId] || []).map(g => g.GB);

            // Determine global Eseg range for this element across this dataset
            const allEseg = dsRecords.map(r => r.Eseg).filter(v => v != null);
            const eMin = allEseg.length ? Math.min(...allEseg) : null;
            const eMax = allEseg.length ? Math.max(...allEseg) : null;

            let html = `
                <div class="element-header">
                    <div class="element-symbol">${symbol}</div>
                    <div>
                        <div class="element-name">${name}</div>
                        <div class="element-sub">${dsInfo.count} records · ${dsInfo.n_grain_boundaries} GBs · ${dsInfo.n_sites} sites</div>
                    </div>
                </div>
                <div class="element-stats">
                    <div class="stat sm"><div class="stat-num">${dsInfo.Eseg_mean ?? '–'} <span class="unit">eV</span></div><div class="stat-lbl">Mean E<sub>seg</sub></div></div>
                    <div class="stat sm"><div class="stat-num">${dsInfo.Eseg_min ?? '–'}</div><div class="stat-lbl">Min</div></div>
                    <div class="stat sm"><div class="stat-num">${dsInfo.Eseg_max ?? '–'}</div><div class="stat-lbl">Max</div></div>
                </div>
                <h4 class="gb-list-heading">Grain boundaries</h4>
                <p class="gb-list-help">Click a card to load the structure with sites colored by E<sub>seg</sub>.</p>
                <div class="gb-card-list">
            `;
            gbList.forEach(gb => {
                const recs = byGB[gb] || [];
                if (!recs.length) {
                    html += `<div class="gb-card disabled"><div class="gb-name"><code>${gb}</code></div><div class="gb-meta">no data</div></div>`;
                    return;
                }
                const ess = recs.map(r => r.Eseg).filter(v => v != null);
                const minE = Math.min(...ess), maxE = Math.max(...ess);
                html += `
                    <button class="gb-card" data-gb="${gb}" data-element="${symbol}" data-ds="${dsId}">
                        <div class="gb-name"><code>${gb}</code></div>
                        <div class="gb-meta">
                            <span>${recs.length} site${recs.length === 1 ? '' : 's'}</span>
                            <span class="gb-eseg">E<sub>seg</sub>: ${minE.toFixed(2)} … ${maxE.toFixed(2)} eV</span>
                        </div>
                    </button>
                `;
            });
            html += `</div>`;

            aside.innerHTML = html;
            aside.querySelectorAll('.gb-card:not(.disabled)').forEach(card => {
                card.onclick = () => openViewer(dsId, card.dataset.gb, symbol, name);
            });
        }

        // =====================================================================
        // 3D Viewer (3Dmol.js)
        // =====================================================================
        async function openViewer(dsId, gb, element, elementName) {
            const panel = document.querySelector(`.dataset-panel[data-ds="${dsId}"]`);
            const region = panel.querySelector('.browse-viewer-region');
            region.hidden = false;

            const isUnrelaxed = dsId === 'fe_x_gb_kp_unrelaxed';
            const noteRelaxed = dsId === 'fe_x_gb_kp_relaxed';

            const cacheKey = `${dsId}/${gb}`;
            let payload = STATE.structureCache[cacheKey];
            if (!payload) {
                region.innerHTML = `<div class="viewer-loading">Loading structure for <code>${gb}</code>…</div>`;
                try {
                    const resp = await fetch(`data/structures/${dsId}/${gb}.json`);
                    payload = await resp.json();
                    STATE.structureCache[cacheKey] = payload;
                } catch (e) {
                    console.error(e);
                    region.innerHTML = `<div class="viewer-loading">Failed to load <code>${gb}</code>.</div>`;
                    return;
                }
            }

            // Build the viewer scaffold
            region.innerHTML = `
                <div class="viewer-header">
                    <div class="viewer-title">
                        <span class="viewer-element-pill" style="background:${cssColor(elementColor(element))}">${element}</span>
                        in <code>${gb}</code>
                    </div>
                    <div class="viewer-actions">
                        <a class="download-btn small" href="data/structures/${dsId}/${gb}.json" download="${gb}-${dsId}.json">Site data (JSON)</a>
                        <button class="download-btn small" id="dl-poscar-${dsId}">Host slab (POSCAR)</button>
                    </div>
                </div>
                ${noteRelaxed ? `<div class="viewer-note">Showing the <strong>unrelaxed</strong> host slab geometry as reference. Site colors use the <em>relaxed</em> E<sub>seg</sub> values for ${element}. Download the full Parquet (Overview tab) for relaxed atomic positions.</div>` : ''}
                <div class="viewer-stage">
                    <div class="viewer-3d" id="viewer3d-${dsId}"></div>
                    <aside class="viewer-side">
                        <div class="viewer-tooltip" id="vt-${dsId}">
                            <div class="vt-empty">Hover an atom for details.</div>
                        </div>
                        <div class="colormap-block">
                            <div class="cm-label"><strong>E<sub>seg</sub> colormap</strong> (eV)</div>
                            <div class="colormap-bar" id="cm-bar-${dsId}"></div>
                            <div class="cm-ticks" id="cm-ticks-${dsId}"></div>
                            <div class="cm-help">Blue ⇒ favourable segregation; red ⇒ unfavourable.</div>
                        </div>
                        <div class="site-list-block">
                            <div class="cm-label"><strong>Sites</strong></div>
                            <div class="site-list" id="site-list-${dsId}"></div>
                        </div>
                    </aside>
                </div>
            `;

            buildViewer(dsId, payload, element, elementName);
            // POSCAR download
            document.getElementById(`dl-poscar-${dsId}`).onclick = () => downloadPOSCAR(payload, gb);

            // Scroll into view
            region.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function buildViewer(dsId, payload, element, elementName) {
            const containerId = `viewer3d-${dsId}`;
            const container = document.getElementById(containerId);
            // Tear down any prior viewer (the surrounding DOM has been replaced,
            // so its canvas is orphaned)
            if (STATE.viewers[dsId] && STATE.viewers[dsId].gl3dViewer) {
                try { STATE.viewers[dsId].gl3dViewer.clear(); } catch (e) {}
            }

            const config = { backgroundColor: 'white' };
            const viewer = $3Dmol.createViewer(container, config);
            STATE.viewers[dsId] = { gl3dViewer: viewer, currentGB: payload.GB, currentElement: element };

            // Build atom list. Site atoms get colored by their Eseg (for the chosen
            // solute element); host atoms remain muted.
            const siteByIndex = {};
            payload.sites.forEach(s => { siteByIndex[s.atom_index] = s; });

            // Determine Eseg range for this (GB, element) for normalization
            const esegs = payload.sites
                .map(s => s.eseg_by_element[element])
                .filter(v => v != null);
            const eMin = esegs.length ? Math.min(...esegs) : -1;
            const eMax = esegs.length ? Math.max(...esegs) : 1;
            const absMax = Math.max(Math.abs(eMin), Math.abs(eMax)) || 1;

            const atoms = payload.host_atoms.map((a, i) => {
                const site = siteByIndex[i];
                const isSite = !!site;
                const eseg = isSite ? site.eseg_by_element[element] : null;
                const sym = isSite ? element : a.element;
                const radius = elementRadius(sym) * (isSite ? 0.55 : 0.40);
                const color = isSite
                    ? (eseg == null ? 0xcccccc : esegToColor(eseg, absMax))
                    : 0xc7c7c7;  // muted host

                return {
                    elem: sym,
                    x: a.xyz[0],
                    y: a.xyz[1],
                    z: a.xyz[2],
                    serial: i,
                    properties: {
                        is_site: isSite,
                        site_label: isSite ? site.label : null,
                        eseg: eseg,
                        host_element: a.element,
                        sub_element: isSite ? element : null,
                        radius,
                        color,
                    },
                };
            });

            viewer.removeAllModels();
            viewer.removeAllShapes();
            const m = viewer.addModel();
            m.addAtoms(atoms);

            // Per-atom styling — sphere with custom radius/color
            atoms.forEach(a => {
                viewer.setStyle(
                    { serial: a.serial },
                    { sphere: { radius: a.properties.radius, color: a.properties.color, opacity: a.properties.is_site ? 1.0 : 0.85 } }
                );
            });

            // Bonds: draw thin sticks between near-neighbors (cutoff ≈ 3.0 Å) so the
            // grain boundary structure reads visually. We render this as cylinders to
            // avoid the auto-bonding heuristic which can be wrong for crystals.
            drawBonds(viewer, atoms, payload.lattice);

            // Unit cell box
            drawUnitCell(viewer, payload.lattice);

            // Hover handlers
            const tooltipEl = document.getElementById(`vt-${dsId}`);
            viewer.setHoverable(
                {},
                true,
                function(atom, vw) {
                    if (!atom) return;
                    showTooltip(tooltipEl, atom, element, elementName);
                    // Re-render this atom slightly larger (replace, not add)
                    viewer.setStyle({ serial: atom.serial }, {
                        sphere: { radius: atom.properties.radius * 1.25, color: atom.properties.color, opacity: 1.0 }
                    });
                    viewer.render();
                },
                function(atom, vw) {
                    if (!atom) return;
                    clearTooltip(tooltipEl);
                    viewer.setStyle({ serial: atom.serial }, {
                        sphere: { radius: atom.properties.radius, color: atom.properties.color, opacity: atom.properties.is_site ? 1.0 : 0.85 }
                    });
                    viewer.render();
                }
            );

            // Click to highlight site in the side list
            viewer.setClickable({ }, true, function(atom) {
                if (!atom || !atom.properties.is_site) return;
                document.querySelectorAll(`#site-list-${dsId} .site-row`).forEach(r => {
                    r.classList.toggle('active', r.dataset.label === atom.properties.site_label);
                });
            });

            viewer.zoomTo();
            viewer.render();
            viewer.zoom(1.1, 500);

            // Side: colormap legend + site list
            renderColormap(dsId, eMin, eMax, absMax);
            renderSiteList(dsId, payload, element, elementName, viewer);
        }

        // ---- Bond drawing -------------------------------------------------
        function drawBonds(viewer, atoms, lattice) {
            // Brute-force pairs within 3.0 Å (no PBC images for v1; cell is large
            // enough that visual bonds are mostly correct).
            const cutoff2 = 3.0 * 3.0;
            for (let i = 0; i < atoms.length; i++) {
                for (let j = i + 1; j < atoms.length; j++) {
                    const dx = atoms[i].x - atoms[j].x;
                    const dy = atoms[i].y - atoms[j].y;
                    const dz = atoms[i].z - atoms[j].z;
                    const d2 = dx*dx + dy*dy + dz*dz;
                    if (d2 < cutoff2 && d2 > 0.5) {
                        viewer.addCylinder({
                            start: { x: atoms[i].x, y: atoms[i].y, z: atoms[i].z },
                            end:   { x: atoms[j].x, y: atoms[j].y, z: atoms[j].z },
                            radius: 0.08,
                            color: 0xb0b0b0,
                            fromCap: 1, toCap: 1,
                        });
                    }
                }
            }
        }

        function drawUnitCell(viewer, latticeMatrix) {
            const a = latticeMatrix[0];
            const b = latticeMatrix[1];
            const c = latticeMatrix[2];
            const o = [0, 0, 0];
            const v = (p, q) => ({
                start: { x: p[0], y: p[1], z: p[2] },
                end:   { x: q[0], y: q[1], z: q[2] },
                radius: 0.04, color: 0x2563eb, dashed: false,
            });
            const add = (p, q) => viewer.addCylinder(v(p, q));
            const ab = [a[0]+b[0], a[1]+b[1], a[2]+b[2]];
            const ac = [a[0]+c[0], a[1]+c[1], a[2]+c[2]];
            const bc = [b[0]+c[0], b[1]+c[1], b[2]+c[2]];
            const abc = [a[0]+b[0]+c[0], a[1]+b[1]+c[1], a[2]+b[2]+c[2]];
            // bottom face
            add(o, a); add(o, b); add(a, ab); add(b, ab);
            // top face
            add(c, ac); add(c, bc); add(ac, abc); add(bc, abc);
            // verticals
            add(o, c); add(a, ac); add(b, bc); add(ab, abc);
        }

        // ---- Tooltip ------------------------------------------------------
        function showTooltip(el, atom, soluteElement, soluteName) {
            const p = atom.properties || {};
            const xyz = `[${atom.x.toFixed(2)}, ${atom.y.toFixed(2)}, ${atom.z.toFixed(2)}] Å`;
            if (p.is_site) {
                const ePill = `<span class="vt-pill" style="background:${cssColor(elementColor(soluteElement))}">${soluteElement}</span>`;
                const eseg = (p.eseg != null) ? `${p.eseg.toFixed(3)} eV` : '—';
                const segClass = p.eseg == null ? '' : (p.eseg < 0 ? 'neg' : 'pos');
                el.innerHTML = `
                    <div class="vt-row vt-title">${ePill} Substitutional site <strong>${p.site_label}</strong></div>
                    <div class="vt-row"><span class="vt-k">If solute = ${soluteElement}:</span></div>
                    <div class="vt-row vt-eseg ${segClass}"><span class="vt-k">E<sub>seg</sub></span> <span class="vt-v">${eseg}</span></div>
                    <div class="vt-row"><span class="vt-k">Position</span> <span class="vt-v">${xyz}</span></div>
                    <div class="vt-row vt-foot">Host site is Fe; coloring shows what E<sub>seg</sub> would be if ${soluteName} were placed here.</div>
                `;
            } else {
                el.innerHTML = `
                    <div class="vt-row vt-title">Host atom: <strong>Fe</strong></div>
                    <div class="vt-row"><span class="vt-k">Position</span> <span class="vt-v">${xyz}</span></div>
                    <div class="vt-row vt-foot">Bulk Fe site (no segregation data).</div>
                `;
            }
        }
        function clearTooltip(el) {
            el.innerHTML = `<div class="vt-empty">Hover an atom for details.</div>`;
        }

        // ---- Side colormap + site list -----------------------------------
        function renderColormap(dsId, eMin, eMax, absMax) {
            const bar = document.getElementById(`cm-bar-${dsId}`);
            const ticks = document.getElementById(`cm-ticks-${dsId}`);
            // Build a CSS gradient sampling the same colormap function.
            const stops = [];
            const N = 11;
            for (let i = 0; i < N; i++) {
                const t = i / (N - 1);          // 0..1
                const e = -absMax + 2 * absMax * t;
                stops.push(`${cssColor(esegToColor(e, absMax))} ${(t*100).toFixed(0)}%`);
            }
            bar.style.background = `linear-gradient(90deg, ${stops.join(', ')})`;
            ticks.innerHTML = `
                <span>${(-absMax).toFixed(2)}</span>
                <span>0</span>
                <span>+${absMax.toFixed(2)}</span>
            `;
        }

        function renderSiteList(dsId, payload, element, elementName, viewer) {
            const host = document.getElementById(`site-list-${dsId}`);
            // Sort sites by Eseg ascending (most-segregating first)
            const sorted = [...payload.sites].sort((a, b) => {
                const ea = a.eseg_by_element[element], eb = b.eseg_by_element[element];
                if (ea == null && eb == null) return 0;
                if (ea == null) return 1;
                if (eb == null) return -1;
                return ea - eb;
            });
            const absMax = Math.max(...payload.sites.map(s => Math.abs(s.eseg_by_element[element] ?? 0))) || 1;

            host.innerHTML = sorted.map(s => {
                const e = s.eseg_by_element[element];
                const eStr = e == null ? '—' : `${e.toFixed(3)} eV`;
                const swatch = e == null ? '#ddd' : cssColor(esegToColor(e, absMax));
                return `<div class="site-row" data-label="${s.label}">
                    <span class="site-swatch" style="background:${swatch}"></span>
                    <span class="site-label">site ${s.label}</span>
                    <span class="site-eseg ${e == null ? '' : (e < 0 ? 'neg' : 'pos')}">${eStr}</span>
                </div>`;
            }).join('');
            // Click site row -> focus the camera on that atom
            host.querySelectorAll('.site-row').forEach(row => {
                row.onclick = () => {
                    const label = row.dataset.label;
                    const s = payload.sites.find(x => x.label === label);
                    if (!s) return;
                    viewer.zoomTo({ serial: s.atom_index });
                    viewer.zoom(1.6, 400);
                    host.querySelectorAll('.site-row').forEach(r => r.classList.toggle('active', r === row));
                };
            });
        }

        // ---- Eseg → color (diverging blue–white–red, perceptual-ish) -----
        // Negative Eseg = favourable segregation = blue.
        // Positive Eseg = unfavourable = red.
        function esegToColor(e, absMax) {
            const t = Math.max(-1, Math.min(1, e / absMax));   // -1..1
            // map to 0..1
            const s = (t + 1) / 2;
            // 3-stop gradient: blue (#2563eb) — white (#f8fafc) — red (#dc2626)
            const stops = [
                [0.0, [37, 99, 235]],
                [0.5, [248, 250, 252]],
                [1.0, [220, 38, 38]],
            ];
            for (let i = 0; i < stops.length - 1; i++) {
                const [t0, c0] = stops[i];
                const [t1, c1] = stops[i + 1];
                if (s >= t0 && s <= t1) {
                    const f = (s - t0) / (t1 - t0);
                    const r = Math.round(c0[0] + f * (c1[0] - c0[0]));
                    const g = Math.round(c0[1] + f * (c1[1] - c0[1]));
                    const b = Math.round(c0[2] + f * (c1[2] - c0[2]));
                    return (r << 16) | (g << 8) | b;
                }
            }
            return 0xffffff;
        }
        function cssColor(intColor) {
            return '#' + intColor.toString(16).padStart(6, '0');
        }

        // ---- POSCAR download (host slab, all-Fe) -------------------------
        function downloadPOSCAR(payload, gb) {
            const lines = [];
            lines.push(`${gb} host slab (Fe-only) — exported from ligerzero.com`);
            lines.push('1.0');
            payload.lattice.forEach(row => {
                lines.push(row.map(v => v.toFixed(8)).join(' '));
            });
            lines.push('Fe');
            lines.push(`${payload.host_atoms.length}`);
            lines.push('Cartesian');
            payload.host_atoms.forEach(a => {
                lines.push(a.xyz.map(v => v.toFixed(8)).join(' '));
            });
            const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${gb}_host.POSCAR`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // =====================================================================
        // Boot
        // =====================================================================
        // Wait for fonts/CSS so layout is stable before we ask 3Dmol to size.
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
